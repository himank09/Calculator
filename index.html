<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Python Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
    }

    .title {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .display {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 20px 20px 12px;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .display .expression {
      color: rgba(255, 255, 255, 0.35);
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      word-break: break-all;
      text-align: right;
    }

    .display .current {
      color: #ffffff;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      padding: 18px 0;
      transition: transform 0.1s ease, opacity 0.1s ease;
      outline: none;
    }

    button:active {
      transform: scale(0.93);
      opacity: 0.85;
    }

    .btn-number {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .btn-number:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .btn-operator {
      background: rgba(96, 165, 250, 0.25);
      color: #93c5fd;
    }

    .btn-operator:hover {
      background: rgba(96, 165, 250, 0.38);
    }

    .btn-operator.active-op {
      background: rgba(96, 165, 250, 0.55);
      color: #ffffff;
    }

    .btn-clear {
      background: rgba(248, 113, 113, 0.2);
      color: #fca5a5;
    }

    .btn-clear:hover {
      background: rgba(248, 113, 113, 0.35);
    }

    .btn-equals {
      grid-column: span 4;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      font-size: 20px;
      font-weight: 500;
      border-radius: 14px;
      padding: 18px 0;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-equals:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 4px 28px rgba(37, 99, 235, 0.6);
    }

    .btn-special {
      background: rgba(167, 139, 250, 0.2);
      color: #c4b5fd;
      font-size: 14px;
    }

    .btn-special:hover {
      background: rgba(167, 139, 250, 0.35);
    }

    .history-panel {
      margin-top: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 14px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .history-panel.open {
      max-height: 200px;
    }

    .history-inner {
      padding: 12px 16px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-title {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .history-item {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: right;
    }

    .history-empty {
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      text-align: center;
      padding: 8px 0;
    }

    .btn-history-toggle {
      width: 100%;
      margin-top: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-history-toggle:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="title">Calculator</div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>

    <div class="buttons">
      <button class="btn-special" onclick="calcSquareRoot()">√</button>
      <button class="btn-special" onclick="calcPercent()">%</button>
      <button class="btn-special" onclick="toggleSign()">+/−</button>
      <button class="btn-clear"   onclick="clearAll()">C</button>

      <button class="btn-number"   onclick="inputDigit('7')">7</button>
      <button class="btn-number"   onclick="inputDigit('8')">8</button>
      <button class="btn-number"   onclick="inputDigit('9')">9</button>
      <button class="btn-operator" onclick="setOperator('÷')" id="op-÷">÷</button>

      <button class="btn-number"   onclick="inputDigit('4')">4</button>
      <button class="btn-number"   onclick="inputDigit('5')">5</button>
      <button class="btn-number"   onclick="inputDigit('6')">6</button>
      <button class="btn-operator" onclick="setOperator('×')" id="op-×">×</button>

      <button class="btn-number"   onclick="inputDigit('1')">1</button>
      <button class="btn-number"   onclick="inputDigit('2')">2</button>
      <button class="btn-number"   onclick="inputDigit('3')">3</button>
      <button class="btn-operator" onclick="setOperator('−')" id="op-−">−</button>

      <button class="btn-number"   onclick="inputDigit('0')">0</button>
      <button class="btn-number"   onclick="inputDecimal()">.</button>
      <button class="btn-number"   onclick="backspace()">⌫</button>
      <button class="btn-operator" onclick="setOperator('+')" id="op-+">+</button>

      <button class="btn-equals"   onclick="calculate()">=</button>
    </div>

    <button class="btn-history-toggle" onclick="toggleHistory()">History</button>

    <div class="history-panel" id="historyPanel">
      <div class="history-inner">
        <div class="history-title">Recent calculations</div>
        <div id="historyList"><div class="history-empty">No calculations yet</div></div>
      </div>
    </div>
  </div>

  <script>
    let current = '0';
    let firstNumber = null;
    let operator = null;
    let resetNext = false;
    let history = [];

    const currentEl    = document.getElementById('current');
    const expressionEl = document.getElementById('expression');
    const historyList  = document.getElementById('historyList');
    const historyPanel = document.getElementById('historyPanel');

    function updateDisplay() {
      currentEl.textContent = current;
    }

    function inputDigit(digit) {
      if (resetNext) { current = digit; resetNext = false; }
      else current = current === '0' ? digit : current + digit;
      updateDisplay();
    }

    function inputDecimal() {
      if (resetNext) { current = '0.'; resetNext = false; updateDisplay(); return; }
      if (!current.includes('.')) { current += '.'; updateDisplay(); }
    }

    function backspace() {
      if (resetNext) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    function clearAll() {
      current = '0'; firstNumber = null; operator = null; resetNext = false;
      expressionEl.textContent = '';
      clearActiveOp();
      updateDisplay();
    }

    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    }

    function calcPercent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }

    function calcSquareRoot() {
      const n = parseFloat(current);
      if (n < 0) { current = 'Error'; updateDisplay(); return; }
      current = String(Math.sqrt(n));
      addToHistory(`√${n} = ${current}`);
      expressionEl.textContent = '';
      resetNext = true;
      updateDisplay();
    }

    function setOperator(op) {
      if (firstNumber !== null && !resetNext) calculate(true);
      firstNumber = parseFloat(current);
      operator = op;
      resetNext = true;
      expressionEl.textContent = `${firstNumber} ${op}`;
      clearActiveOp();
      const btn = document.getElementById(`op-${op}`);
      if (btn) btn.classList.add('active-op');
    }

    function clearActiveOp() {
      document.querySelectorAll('.btn-operator').forEach(b => b.classList.remove('active-op'));
    }

    function calculate(chained = false) {
      if (firstNumber === null || operator === null) return;
      const second = parseFloat(current);
      const ops = { '+': (a,b)=>a+b, '−': (a,b)=>a-b, '×': (a,b)=>a*b, '÷': (a,b)=> b===0 ? 'Error: ÷0' : a/b };
      const result = ops[operator](firstNumber, second);
      if (!chained) {
        addToHistory(`${firstNumber} ${operator} ${second} = ${result}`);
        expressionEl.textContent = `${firstNumber} ${operator} ${second} =`;
      }
      current = String(result);
      firstNumber = null; operator = null; resetNext = true;
      clearActiveOp();
      updateDisplay();
    }

    function addToHistory(entry) {
      history.unshift(entry);
      if (history.length > 20) history.pop();
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">No calculations yet</div>';
        return;
      }
      historyList.innerHTML = history
        .map(e => `<div class="history-item">${e}</div>`)
        .join('');
    }

    function toggleHistory() {
      historyPanel.classList.toggle('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('−');
      else if (e.key === '*') setOperator('×');
      else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
    });
  </script>
</body>
</html>
